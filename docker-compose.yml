services:
  db:
    image: postgres:16-alpine
    container_name: chess-lms-db
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess
    ports:
      - "5433:5432"
    volumes:
      - chess_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  chess_pgdata:
